name: Auto-tag Release Commits

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: write

concurrency:
  group: release-tag-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  tag-release:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'release/next' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Determine release tag
        id: release
        run: |
          git fetch --tags origin
          pr_title='${{ github.event.pull_request.title }}'

          if ! printf '%s\n' "${pr_title}" | grep -Eq '^chore\(release\): v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Release PR title is not a valid release title: ${pr_title}"
            exit 1
          fi

          tag_name="$(printf '%s\n' "${pr_title}" | sed -E 's/^chore\(release\): (v[0-9]+\.[0-9]+\.[0-9]+)$/\1/')"
          crate_version="$(sed -n 's/^version = "\(.*\)"/\1/p' inngest/Cargo.toml | head -n 1)"

          if [ "${tag_name#v}" != "${crate_version}" ]; then
            echo "Release commit tag ${tag_name} does not match inngest/Cargo.toml version ${crate_version}"
            exit 1
          fi

          if git rev-parse "${tag_name}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.release.outputs.skip == 'false'
        run: |
          git tag "${{ steps.release.outputs.tag_name }}"
          git push origin "${{ steps.release.outputs.tag_name }}"
